name: moonjoin_cloud
description: "MoonJoin Cloud - Tenant logistics dashboard for third-party businesses (Flutter mobile + responsive web)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  get: ^4.6.6

  # Persistence
  shared_preferences: ^2.0.11

  # Networking
  http: ^1.2.1
  connectivity_plus: ^5.0.2

  # Firebase (new dedicated MoonJoin Cloud project)
  # Upgraded from 2.x/14.x/3.x to the Firebase iOS 11.x line because the older
  # plugins ship `#import <Firebase/Firebase.h>` (non-modular) in their public
  # framework headers, which Xcode 16 rejects even with
  # CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES set on every
  # Pods target. The 4.x/16.x/5.x line uses `@import Firebase;` instead.
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  firebase_crashlytics: ^5.0.5
  flutter_local_notifications: ^17.1.2

  # Web/PWA
  url_strategy: ^0.2.0
  universal_html: ^2.0.8
  pointer_interceptor: ^0.10.1
  meta_seo: ^3.0.5

  # Auth
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  # 4.3.0 used Flutter V1 embedding (Registrar). 6.x+ migrated to V2.
  sign_in_with_apple: ^6.1.4

  # Forms / UI primitives
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  phone_numbers_parser: ^8.2.1
  flutter_typeahead: ^4.3.7
  flutter_svg: ^2.0.10+1
  flutter_slidable: ^3.0.0
  dotted_border: ^2.0.0+1
  shimmer_animation: ^2.1.0+1
  carousel_slider: ^4.0.0
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  share_plus: ^7.2.1

  # Maps & location
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.7
  geolocator: ^10.1.0

  # WebView (fund-wallet flow with Paystack / Flutterwave / Monnify)
  # 6.x is required for Xcode 16+ — the 5.x Swift code uses an evaluateJavaScript
  # overload that became ambiguous in the iOS 17/18 SDK. Pinned below 6.1.4
  # because 6.1.4+ pulls a flutter_inappwebview_ios that conflicts with the
  # Firebase 10.x line (matching firebase_messaging 14.9.x in this pubspec).
  flutter_inappwebview: ">=6.0.0 <6.1.4"
  url_launcher: ^6.1.2

  # Media / images
  image_picker: ^1.0.7
  # image_compression_flutter removed in RC1: 1.0.4 uses the Flutter V1
  # `Registrar` API which newer Flutter SDKs no longer ship. Package is not
  # referenced anywhere in lib/. If image compression is needed later, use
  # `flutter_image_compress` directly (already supports V2 embedding).
  image: ^4.2.0

  # Formatting
  intl: ^0.19.0
  animated_flip_counter: ^0.2.5
  path_provider: ^2.0.8

  # Analytics charts (net-new for MoonJoin Cloud dashboard)
  fl_chart: ^0.68.0

  # Idempotency-Key generation (Phase C)
  uuid: ^4.0.0

# -----------------------------------------------------------------------------
# RC1 stability override: pin google_sign_in_ios <= 5.8.1.
#
# google_sign_in_ios 5.9.0+ bumped its CocoaPods dep to `GoogleSignIn ~> 8.0`,
# which transitively pulls AppCheckCore 11.x → GoogleUtilities/Environment 8.x.
# That clashes with firebase_messaging 14.9.x (Firebase iOS 10.25), which pins
# GoogleUtilities/Environment ~> 7.x.
#
# 5.8.1 still uses GoogleSignIn ~> 7.1 (no AppCheckCore in the graph), which
# resolves cleanly against Firebase 10.25.
#
# Remove this override when the Firebase plugins are upgraded to ^4.x / ^16.x
# (Firebase iOS 11.x ecosystem) — both sides will use GoogleUtilities 8.x and
# the conflict goes away naturally.
# -----------------------------------------------------------------------------
dependency_overrides:
  google_sign_in_ios: 5.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/map/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-Regular.ttf
          weight: 400
        - asset: assets/font/Roboto-Medium.ttf
          weight: 500
        - asset: assets/font/Roboto-Bold.ttf
          weight: 700
        - asset: assets/font/Roboto-Black.ttf
          weight: 900
