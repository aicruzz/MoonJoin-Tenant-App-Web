name: moonjoin_cloud
description: "MoonJoin Cloud - Tenant logistics dashboard for third-party businesses (Flutter mobile + responsive web)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  get: ^4.6.6

  # Persistence
  shared_preferences: ^2.0.11

  # Networking
  http: ^1.2.1
  connectivity_plus: ^5.0.2

  # Firebase (new dedicated MoonJoin Cloud project)
  firebase_core: ^2.31.1
  firebase_messaging: ^14.9.3
  firebase_crashlytics: ^3.5.7
  flutter_local_notifications: ^17.1.2

  # Web/PWA
  url_strategy: ^0.2.0
  universal_html: ^2.0.8
  pointer_interceptor: ^0.10.1
  meta_seo: ^3.0.5

  # Auth
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  sign_in_with_apple: ^4.3.0

  # Forms / UI primitives
  pin_code_fields: ^8.0.1
  country_code_picker: ^3.0.0
  phone_numbers_parser: ^8.2.1
  flutter_typeahead: ^4.3.7
  flutter_svg: ^2.0.10+1
  flutter_slidable: ^3.0.0
  dotted_border: ^2.0.0+1
  shimmer_animation: ^2.1.0+1
  carousel_slider: ^4.0.0
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  share_plus: ^7.2.1

  # Maps & location
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.7
  geolocator: ^10.1.0

  # WebView (fund-wallet flow with Paystack / Flutterwave / Monnify)
  flutter_inappwebview: ^5.8.0
  url_launcher: ^6.1.2

  # Media / images
  image_picker: ^1.0.7
  image_compression_flutter: ^1.0.4
  image: ^4.2.0

  # Formatting
  intl: ^0.19.0
  animated_flip_counter: ^0.2.5
  path_provider: ^2.0.8

  # Analytics charts (net-new for MoonJoin Cloud dashboard)
  fl_chart: ^0.68.0

  # Idempotency-Key generation (Phase C)
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/map/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-Regular.ttf
          weight: 400
        - asset: assets/font/Roboto-Medium.ttf
          weight: 500
        - asset: assets/font/Roboto-Bold.ttf
          weight: 700
        - asset: assets/font/Roboto-Black.ttf
          weight: 900
